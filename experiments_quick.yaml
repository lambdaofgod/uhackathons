experiments:
  - name: discrete_sparse
    problems:
      - CartPole-v1
      - MountainCar-v0
      - LunarLander-v3
    algorithms:
      - dqn
      - ppo

  - name: continuous_control
    problems:
      - Pendulum-v1
      - LunarLanderContinuous-v3
    algorithms:
      - ppo
      - a2c

training:
  total_timesteps: 512
  n_eval_episodes: 2
  eval_freq: 256
  n_seeds: 1
  log_dir: ./results

algorithms:
  dqn:
    policy: MlpPolicy
    learning_rate: 0.0001
    buffer_size: 1000
    learning_starts: 100
    batch_size: 32
    tau: 1.0
    gamma: 0.99
    train_freq: 4
    target_update_interval: 100
    exploration_fraction: 0.1
    exploration_final_eps: 0.05

  ppo:
    policy: MlpPolicy
    learning_rate: 0.0003
    n_steps: 128
    batch_size: 64
    n_epochs: 2
    gamma: 0.99
    gae_lambda: 0.95
    clip_range: 0.2
    ent_coef: 0.01
    vf_coef: 0.5

  a2c:
    policy: MlpPolicy
    learning_rate: 0.0007
    n_steps: 5
    gamma: 0.99
    gae_lambda: 1.0
    ent_coef: 0.01
    vf_coef: 0.5

  reinforce:
    _base: a2c
    policy: MlpPolicy
    learning_rate: 0.001
    n_steps: 128
    gamma: 0.99
    gae_lambda: 1.0
    ent_coef: 0.0
    vf_coef: 0.5
